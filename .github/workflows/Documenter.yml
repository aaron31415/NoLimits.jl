name: Documenter

on:
  push:
    branches: [main]
    tags: ['*']
  pull_request:

permissions:
  contents: write
  pages: write
  id-token: write
  statuses: write

jobs:
  docs:
    name: Documentation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: julia-actions/setup-julia@v2
        with:
          version: "1.12"

      - uses: julia-actions/cache@v2

      # Node.js is provided by DocumenterVitepress via NodeJS_jll — no setup-node step needed.
      # julia-docdeploy builds with --project=docs/ and dev-installs the package into it.
      - uses: julia-actions/julia-docdeploy@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DOCUMENTER_KEY: ${{ secrets.DOCUMENTER_KEY }}
          GKSwstype: "100"   # headless GR backend for Plots.jl
